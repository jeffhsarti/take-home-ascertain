server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Reverse-proxy API calls to the backend, stripping the /api prefix
    # (the trailing slash on proxy_pass performs the strip).
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # FastAPI's docs HTML loads /openapi.json (root-relative). Without these
    # explicit locations the JSON fetch falls through to the SPA index.html and
    # Swagger UI fails to parse it. Keeps both :8000/docs and :8080/docs working.
    location = /openapi.json { proxy_pass http://backend:8000/openapi.json; }
    location = /docs         { proxy_pass http://backend:8000/docs; }
    location = /redoc        { proxy_pass http://backend:8000/redoc; }

    # SPA fallback: serve index.html for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
